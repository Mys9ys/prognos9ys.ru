<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000" fill="none">
  <defs>
    <linearGradient id="bdgGold" x1="500" y1="120" x2="500" y2="520" gradientUnits="userSpaceOnUse">
      <stop stop-color="#fff4d0"/><stop offset="1" stop-color="#d4a840"/>
