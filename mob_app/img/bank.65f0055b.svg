<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000" fill="none">
  <defs>
    <linearGradient id="bkStone" x1="500" y1="180" x2="500" y2="900" gradientUnits="userSpaceOnUse">
      <stop stop-color="#c8d4e4"/><stop offset="1" stop-color="#7a8ea4"/>
    </linearGradient>
    <linearGradient id="bkCol" x1="500" y1="300" x2="500" y2="700" gradientUnits="userSpaceOnUse">
      <stop stop-color="#f4f8fc"/><stop offset="1" stop-color="#c8d4e0"/>
    </linearGradient>
    <linearGradient id="bkDoor" x1="500" y1="480" x2="500" y2="680" gradientUnits="userSpaceOnUse">
      <stop stop-color="#f0c060"/><stop offset="1" stop-color="#c87828"/>
    </linearGradient>
    <radialGradient id="bkGlow" cx="50%" cy="50%" r="50%">
      <stop stop-color="#fff8c0"/><stop offset="1" stop-color="#f0a830"/>
    </radialGradient>
  </defs>
  <!-- pediment -->
  <path d="M120 340 L500 180 L880 340 V400 H120 Z" fill="url(#bkStone)" stroke="#5a6a7c" stroke-width="14" stroke-linejoin="round"/>
  <circle cx="500" cy="290" r="55" fill="url(#bkGlow)" stroke="#8a6420" stroke-width="10"/>
  <!-- roof shadow -->
  <path d="M140 380 H860" stroke="#5a6a7c" stroke-width="8" opacity=".4"/>
  <!-- columns -->
  <rect x="200" y="380" width="90" height="380" rx="18" fill="url(#bkCol)" stroke="#5a6a7c" stroke-width="10"/>
  <rect x="370" y="380" width="90" height="380" rx="18" fill="url(#bkCol)" stroke="#5a6a7c" stroke-width="10"/>
  <rect x="540" y="380" width="90" height="380" rx="18" fill="url(#bkCol)" stroke="#5a6a7c" stroke-width="10"/>
  <rect x="710" y="380" width="90" height="380" rx="18" fill="url(#bkCol)" stroke="#5a6a7c" stroke-width="10"/>
  <!-- column caps -->
  <rect x="190" y="360" width="110" height="40" rx="8" fill="#dce4ee" stroke="#5a6a7c" stroke-width="8"/>
  <rect x="360" y="360" width="110" height="40" rx="8" fill="#dce4ee" stroke="#5a6a7c" stroke-width="8"/>
  <rect x="530" y="360" width="110" height="40" rx="8" fill="#dce4ee" stroke="#5a6a7c" stroke-width="8"/>
  <rect x="700" y="360" width="110" height="40" rx="8" fill="#dce4ee" stroke="#5a6a7c" stroke-width="8"/>
  <!-- arch & door -->
  <path d="M420 480 H580 V700 H420 Z" fill="url(#bkDoor)" stroke="#8a5520" stroke-width="12"/>
  <path d="M420 480 H580 V540 Q500 600 420 540 Z" fill="#ffe8a0" opacity=".85"/>
  <rect x="488" y="580" width="24" height="24" rx="6" fill="#8a5520"/>
  <!-- steps -->
  <rect x="100" y="760" width="800" height="50" rx="8" fill="#6a7a8c"/>
  <rect x="80" y="810" width="840" height="50" rx="8" fill="#5a6a7c"/>
  <rect x="60" y="860" width="880" height="55" rx="8" fill="#4a5a6c"/>
  <!-- BANK text -->
  <text x="500" y="365" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="42" font-weight="700" fill="#5a6a7c" letter-spacing="8">BANK</text>
</svg>
