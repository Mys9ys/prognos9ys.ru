    C560 630 540 670 500 670 C460 670 440 630 410 640 C380 650 360 620 330 610
    C300 600 300 560 280 530 C260 500 220 500 210 470 C200 440 230 420 230 390
    C230 360 200 340 210 310 C220 280 260 280 280 250 C300 220 300 180 330 170
    C360 160 380 130 410 140 C440 150 460 110 500 110 Z" fill="url(#bdgGold)" stroke="#8a6420" stroke-width="16"/>
  <!-- inner ring -->
  <circle cx="500" cy="390" r="175" fill="none" stroke="#8a6420" stroke-width="14"/>
  <circle cx="500" cy="390" r="150" fill="#f0d888" stroke="#a87828" stroke-width="8"/>
  <!-- star -->
  <path d="M500 260 L535 350 H630 L555 410 L585 505 L500 455 L415 505 L445 410 L370 350 H465 Z" fill="url(#bdgStar)" stroke="#8a6420" stroke-width="10" stroke-linejoin="round"/>
