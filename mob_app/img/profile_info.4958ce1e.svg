<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000" fill="none">
  <defs>
    <linearGradient id="cardBg" x1="200" y1="180" x2="800" y2="820" gradientUnits="userSpaceOnUse">
      <stop stop-color="#f0f4fa"/><stop offset="1" stop-color="#b8c8dc"/>
    </linearGradient>
    <linearGradient id="avatarBg" x1="320" y1="300" x2="480" y2="500" gradientUnits="userSpaceOnUse">
      <stop stop-color="#9ab0c8"/><stop offset="1" stop-color="#6a8098"/>
    </linearGradient>
  </defs>
  <!-- card -->
  <rect x="160" y="200" width="680" height="600" rx="48" fill="url(#cardBg)" stroke="#6a8098" stroke-width="20"/>
  <rect x="200" y="240" width="600" height="520" rx="32" fill="none" stroke="#8a9cb0" stroke-width="8" opacity=".4"/>
  <!-- avatar circle -->
  <circle cx="400" cy="420" r="110" fill="url(#avatarBg)" stroke="#5a7088" stroke-width="14"/>
  <circle cx="400" cy="390" r="42" fill="#dce4ee" stroke="#5a7088" stroke-width="8"/>
  <path d="M290 510 C310 460 350 440 400 440 C450 440 490 460 510 510" fill="#dce4ee" stroke="#5a7088" stroke-width="8"/>
  <!-- info lines -->
  <rect x="560" y="320" width="200" height="28" rx="14" fill="#8a9cb0" opacity=".55"/>
  <rect x="560" y="390" width="260" height="22" rx="11" fill="#8a9cb0" opacity=".4"/>
  <rect x="560" y="440" width="220" height="22" rx="11" fill="#8a9cb0" opacity=".35"/>
  <rect x="560" y="490" width="180" height="22" rx="11" fill="#8a9cb0" opacity=".3"/>
  <rect x="240" y="580" width="520" height="22" rx="11" fill="#8a9cb0" opacity=".35"/>
  <rect x="240" y="630" width="440" height="22" rx="11" fill="#8a9cb0" opacity=".28"/>
  <rect x="240" y="680" width="360" height="22" rx="11" fill="#8a9cb0" opacity=".22"/>
  <!-- corner clip -->
  <circle cx="760" cy="280" r="28" fill="#6a8098" opacity=".25"/>
</svg>
