<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000" fill="none">
  <defs>
    <linearGradient id="sackMain" x1="500" y1="280" x2="500" y2="900" gradientUnits="userSpaceOnUse">
      <stop stop-color="#f5d76e"/><stop offset=".5" stop-color="#e0b23a"/><stop offset="1" stop-color="#a67c14"/>
    </linearGradient>
    <linearGradient id="sackShadow" x1="500" y1="600" x2="500" y2="920" gradientUnits="userSpaceOnUse">
      <stop stop-color="#c8941a"/><stop offset="1" stop-color="#7a5510"/>
    </linearGradient>
    <linearGradient id="sackTop" x1="500" y1="200" x2="500" y2="380" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffe9a0"/><stop offset="1" stop-color="#d4a82a"/>
    </linearGradient>
    <radialGradient id="sackFold" cx="50%" cy="40%" r="60%">
      <stop stop-color="#fff2b8"/><stop offset="1" stop-color="#e8c040"/>
    </radialGradient>
  </defs>
  <!-- sack body -->
  <path d="M500 860 C280 860 180 680 200 500 C215 360 310 280 500 260 C690 280 785 360 800 500 C820 680 720 860 500 860 Z" fill="url(#sackMain)" stroke="#8a6010" stroke-width="16" stroke-linejoin="round"/>
  <path d="M500 860 C350 860 260 720 270 560 C280 440 360 380 500 370 C640 380 720 440 730 560 C740 720 650 860 500 860 Z" fill="url(#sackShadow)"/>
  <!-- gather folds -->
  <path d="M340 420 Q500 500 660 420" stroke="#8a6010" stroke-width="10" fill="none" opacity=".35"/>
  <path d="M300 500 Q500 580 700 500" stroke="#8a6010" stroke-width="8" fill="none" opacity=".25"/>
  <!-- neck / tie -->
  <path d="M360 300 C400 250 600 250 640 300 C660 330 640 380 500 400 C360 380 340 330 360 300 Z" fill="url(#sackTop)" stroke="#8a6010" stroke-width="12"/>
  <ellipse cx="500" cy="310" rx="130" ry="45" fill="url(#sackFold)" stroke="#8a6010" stroke-width="8"/>
  <!-- drawstring -->
  <path d="M370 305 Q500 340 630 305" stroke="#6d4c0c" stroke-width="14" stroke-linecap="round" fill="none"/>
  <path d="M395 295 L385 260 M605 295 L615 260" stroke="#6d4c0c" stroke-width="12" stroke-linecap="round"/>
  <circle cx="385" cy="248" r="16" fill="#6d4c0c"/>
  <circle cx="615" cy="248" r="16" fill="#6d4c0c"/>
  <!-- dollar -->
  <text x="500" y="620" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-size="220" font-weight="800" fill="#6d4c0c">$</text>
  <!-- highlight -->
  <ellipse cx="380" cy="480" rx="80" ry="120" fill="#fff" opacity=".18" transform="rotate(-15 380 480)"/>
</svg>
