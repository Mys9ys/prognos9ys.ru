  <path d="M620 560 L700 820 L500 700 L580 560 Z" fill="url(#bdgRibbon)" stroke="#8a6420" stroke-width="14" stroke-linejoin="round"/>
  <path d="M420 700 H580" stroke="#8a6420" stroke-width="10"/>
  <!-- ribbon V cuts -->
  <path d="M300 820 L340 760 M700 820 L660 760" stroke="#8a6420" stroke-width="12" stroke-linecap="round"/>
  <!-- shine -->
  <ellipse cx="420" cy="300" rx="60" ry="35" fill="#fff" opacity=".35" transform="rotate(-20 420 300)"/>
